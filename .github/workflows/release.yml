name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., v0.2.1). If not provided, it will be auto-incremented."
        required: false
        default: ""
      dist_tag:
        description: "NPM distribution tag (e.g., 'latest', 'dev', 'beta'). Defaults to 'latest'."
        required: false
        default: "latest"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create_release:
    # we assume this runs only on main, and to merge to main
    # it was already tested properly.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    if: github.ref == 'refs/heads/main'   # Only allow releases from main branch
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # ------------------------------------------------------------------
      # 1. Work out what version we are about to release
      # ------------------------------------------------------------------
      - name: Determine Version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          CHANNEL="${{ github.event.inputs.dist_tag }}"
          SHORT_SHA=$(git rev-parse --short HEAD)

          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION"
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$CHANNEL" != "latest" ]; then
            BASE_VERSION=$(jq -r '.version' package.json)
            NEW_VERSION="v${BASE_VERSION}-${CHANNEL}.${SHORT_SHA}"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_TAG=$(gh release view --json tagName --jq .tagName 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION=${LATEST_TAG#v}
          NEW_VERSION_NO_V=$(npx --yes semver -i patch "$LATEST_VERSION")
          NEW_VERSION="v${NEW_VERSION_NO_V}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # 2. Install tooling
      # ------------------------------------------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # ------------------------------------------------------------------
      # 3. Bump the version locally (for the build & publish only)
      # ------------------------------------------------------------------
      # We intentionally do NOT commit the bump back to main. `main` requires a reviewed pull request
      # (classic branch protection) and GitHub Actions cannot create or approve PRs, so a single
      # release run cannot land a commit on main. As with the rc/dev channels, the released version
      # lives in the git tag + the published package; bump main's package.json via a normal PR when
      # you want the repo default to track the latest release.
      - name: Bump package.json version
        run: |
          pnpm version "$(echo ${{ steps.version.outputs.version }} | sed 's/^v//')" --no-git-tag-version

      # ------------------------------------------------------------------
      # 4. Tag the release (tags are not covered by the branch protections)
      # ------------------------------------------------------------------
      - name: Create and push git tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      # ------------------------------------------------------------------
      # 5. Publish to NPM with rollback on failure
      # ------------------------------------------------------------------
      - name: Publish to NPM
        run: |
          pnpm publish --tag ${{ github.event.inputs.dist_tag }} --provenance --no-git-checks || {
            echo "Publish failed, deleting tag & release"
            if [ "${{ github.event.inputs.dist_tag }}" = "latest" ]; then
              gh release delete ${{ steps.version.outputs.version }} --yes 2>/dev/null || true
            fi
            git push origin ":refs/tags/${{ steps.version.outputs.version }}"
            exit 1
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}

      # ------------------------------------------------------------------
      # 6. Create GitHub release
      # ------------------------------------------------------------------
      - name: Create GitHub Release
        if: ${{ github.event.inputs.dist_tag == 'latest' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.version }} \
            --repo="$GITHUB_REPOSITORY" \
            --title="${{ steps.version.outputs.version }}" \
            --generate-notes


